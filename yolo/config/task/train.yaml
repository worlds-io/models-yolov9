task: train

defaults:
  - validation: ../validation

epoch: 500

data:
  batch_size: 16
  image_size: ${image_size}
  cpu_num: ${cpu_num}
  shuffle: True
  pin_memory: True
  data_augment:
    Colorspace: 0.5
    HorizontalFlip: 0.5
    RandomPad: 0.125
    RandomCrop: 0.25
    RemoveOutliers: 1e-8

optimizer:
  type: SGD
  args:
    lr: 0.0005
    weight_decay: 0.0005
    momentum: 0.937
    nesterov: true

loss:
  objective:
    BCELoss: 0.5
    BoxLoss: 7.5
    DFLoss: 1.5
  aux:
    0.25
  matcher:
    iou: CIoU
    topk: 10
    factor:
      iou: 6.0
      cls: 0.5

scheduler:
  type: CosineAnnealingLR
  warmup:
    epochs: 1.0
  args:
    T_max: ${task.epoch}
    eta_min: 0.000005

ema:
  enable: true
  decay: 0.9999
  tau: 2000
